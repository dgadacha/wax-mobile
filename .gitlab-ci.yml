stages:
  - build
  - deploy

variables:
  IMAGE: $CI_REGISTRY_IMAGE:latest

.docker_base:
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build:
  extends: .docker_base
  stage: build
  script:
    - docker build --no-cache -t $IMAGE .
    - docker push $IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  script:
    - kubectl config use-context kidnar/wax:wax-agent
    # Namespace must exist before other resources can reference it.
    - kubectl apply -f k8s/namespace.yaml
    # Apply the full directory — new manifests (ingress, networkpolicy, …)
    # are picked up automatically; no CI change needed when adding files.
    - kubectl apply -f k8s/
    - kubectl rollout restart deployment/wax -n wax
    - kubectl rollout status deployment/wax -n wax --timeout=120s
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: [build]
