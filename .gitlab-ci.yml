stages:
  - build
  - deploy

variables:
  IMAGE: $CI_REGISTRY_IMAGE:latest

.docker_base:
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build:
  extends: .docker_base
  stage: build
  script:
    - docker build --no-cache -t $IMAGE .
    - docker push $IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  script:
    - kubectl config use-context kidnar/wax:wax-agent
    # --validate=false: the GitLab kas (Kubernetes Agent Server) proxy
    # at kas.gitlab.com/k8s-proxy/openapi/v2 intermittently times out,
    # which makes `kubectl apply` refuse to proceed because it can't
    # fetch the cluster's OpenAPI schema. Skipping client-side
    # validation lets the apply hit the server, which does its own
    # validation when it processes the resources. No real safety loss
    # — the server-side validation is the authoritative one anyway.
    - kubectl apply --validate=false -f k8s/namespace.yaml
    - kubectl apply --validate=false -f k8s/
    - kubectl rollout restart deployment/wax -n wax
    - kubectl rollout status deployment/wax -n wax --timeout=120s
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs: [build]
