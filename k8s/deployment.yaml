apiVersion: apps/v1
kind: Deployment
metadata:
  name: wax
  namespace: wax
  labels:
    app: wax
spec:
  replicas: 1
  # JSON library files on a RWO PVC — only one pod at a time. Recreate avoids
  # the "rolling update tries to bind the PVC twice" race during deploys.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: wax
  template:
    metadata:
      labels:
        app: wax
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: wax
          image: registry.gitlab.com/kidnar/wax:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: WAX_LIBRARY_DIR
              value: /data
            - name: WAX_YT_DLP
              value: /usr/local/bin/yt-dlp
            - name: WAX_FFMPEG
              value: /usr/bin/ffmpeg
            # Single-user login gate. Both vars sourced from the wax-auth
            # secret (create with:
            #   kubectl -n wax create secret generic wax-auth \
            #     --from-literal=email='you@example.com' \
            #     --from-literal=password='your-strong-password'
            # ). Leaving either empty disables the gate server-side.
            - name: WAX_AUTH_EMAIL
              valueFrom:
                secretKeyRef:
                  name: wax-auth
                  key: email
            - name: WAX_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wax-auth
                  key: password
            # Claude Haiku key for the AI playlist generator. optional:true
            # so the pod still boots without it — the /api/ai/* endpoints
            # just return 503 until the secret exists. Create with:
            #   kubectl -n wax create secret generic wax-ai \
            #     --from-literal=anthropic-api-key='sk-ant-...'
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wax-ai
                  key: anthropic-api-key
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          # Express doesn't expose a /healthz — a successful TCP accept on
          # 3000 means the server is past startup.
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              # yt-dlp spawns up to 3 parallel processes (the in-process
              # semaphore); each can briefly spike CPU during signature
              # extraction. 2 cores headroom keeps things responsive.
              memory: "1Gi"
              cpu: "2000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wax-data
