# Internal Traefik ingress for in-LAN access (wax.maiz.local).
# Public access goes through Cloudflare Tunnel.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wax-ingress
  namespace: wax
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: wax.maiz.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wax
                port:
                  number: 80
