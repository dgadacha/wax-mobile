<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover: required for env(safe-area-inset-*) to expose
       non-zero values on iOS (notch) and Android display cutouts. The
       Capacitor WKWebView honours this; on the web the meta has no effect
       but doesn't break anything. -->
  <!-- interactive-widget=resizes-content (iOS 16.4+ / Chromium): when
       the on-screen keyboard appears, shrink the layout viewport so
       fixed-positioned content (modals, headers) stays above the
       keyboard instead of getting covered. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-content" />
  <!-- PWA / iOS home-screen install -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wax" />
  <meta name="theme-color" content="#0d0f14" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <title>Wax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
